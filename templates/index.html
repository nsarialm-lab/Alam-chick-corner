<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alam Chicken Corner - Patna</title>
<style>
    * { box-sizing: border-box; }
    body { font-family: 'Roboto', Arial, sans-serif; margin: 0; background: #f1f3f6; }
    
    /* NAVBAR - Flipkart wala */
    .navbar { background: #d32f2f; color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .navbar .left { display: flex; align-items: center; gap: 15px; }
    .navbar img { width: 45px; height: 45px; border-radius: 50%; background: white; padding: 3px; }
    .navbar .logo-text { font-size: 20px; font-weight: bold; }
    .navbar input { flex: 1; max-width: 500px; padding: 10px; border-radius: 4px; border: none; margin: 0 20px; }
    .cart-btn { background: white; color: #d32f2f; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; }
    
    /* BANNER */
    .banner { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1565557623262-aab9914dbbef?q=80&w=1200') center/cover; color: white; text-align: center; padding: 70px 20px; }
    .banner h1 { font-size: 36px; margin: 0; text-shadow: 2px 2px 6px black; }
    .banner p { font-size: 18px; margin-top: 10px; }
    
    /* CATEGORY */
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    .category { display: flex; gap: 15px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
